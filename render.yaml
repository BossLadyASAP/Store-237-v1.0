services:
  - type: web
    name: store-237
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: store-237-db
          property: connectionString
      - key: UPLOAD_FOLDER
        value: /tmp/uploads

databases:
  - name: store-237-db
    engine: postgres
    plan: free
    version: "15"
